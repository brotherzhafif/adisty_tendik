name: adisty_tendik_module
description: "Modul Tenaga Kependidikan (Tendik) untuk Adisty UAD"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management & Equatable
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  # Networking
  dio: ^5.9.2

  # Security & Storage
  flutter_secure_storage: ^10.0.0

  # Hardware & Device Utilities
  geolocator: ^14.0.1
  network_info_plus: ^8.1.0
  device_info_plus: ^13.1.0
  android_id: ^0.5.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true